services:
  antigravity-proxy:
    image: hygorfragas/antigravity-proxy:latest
    container_name: antigravity-proxy
    ports:
      - "${PROXY_HOST_PORT:-3010}:3000"
    environment:
      PORT: 3000
      AUTH_DB_PATH: /data/auth/state.vscdb
      ENABLE_QUICK_TUNNEL: "false"
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://antigravity.flowkaze.com.br}
    volumes:
      - ${AUTH_DB_HOST_PATH:?Set AUTH_DB_HOST_PATH in .env to your local state.vscdb file}:/data/auth/state.vscdb:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/v1/models').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
